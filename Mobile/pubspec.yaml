name: altcointrader
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '3.10.4'
  flutter: "3.38.5"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_bloc: 9.1.1
  go_router: ^17.1.0
  webview_flutter: ^4.13.1
  webview_flutter_web: ^0.2.3+4
  lucide_icons_flutter: ^3.1.10
  equatable: ^2.0.8
  get_it: ^9.2.1
  jwt_decoder: 2.0.1
  http: ^1.6.0
  flutter_gen_runner: ^5.12.0
  build_runner: ^2.11.1
  simple_icons: ^14.6.1
  url_launcher: ^6.3.2
  flutter_svg: ^2.2.3
  cached_network_image: ^3.4.1
  skeletonizer: ^2.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter_gen:
  output: lib/generated/

flutter:
  uses-material-design: true
  assets:
    - assets/png/
